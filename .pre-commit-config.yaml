repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7
          - types-pyyaml
        files: ^asteroid_belt/
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
  - repo: local
    hooks:
      - id: no-runtime-data
        name: reject runtime data files in commit
        language: system
        entry: |-
          bash -c 'if git diff --cached --name-only | grep -E "^data/(runs|pools)/.*\.parquet$"; then echo "ERROR runtime data files staged"; exit 1; fi'
        pass_filenames: false
