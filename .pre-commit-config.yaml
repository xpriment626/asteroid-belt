repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        # Run mypy from the project venv so it sees polars + pydantic + duckdb
        # exactly as the codebase does (pre-commit's isolated env can't load
        # polars cheaply, and we want hook-mypy == project-mypy).
        name: mypy (project venv)
        language: system
        entry: .venv/bin/mypy
        types: [python]
        files: ^asteroid_belt/
        pass_filenames: false
        args: [asteroid_belt]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
  - repo: local
    hooks:
      - id: no-runtime-data
        name: reject runtime data files in commit
        language: system
        entry: |-
          bash -c 'if git diff --cached --name-only | grep -E "^data/(runs|pools)/.*\.parquet$"; then echo "ERROR runtime data files staged"; exit 1; fi'
        pass_filenames: false
